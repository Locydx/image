<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 随机图片选择器 · 云端同步</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-sub: #8b949e;
            --primary: #58a6ff;
            --primary-glow: rgba(88,166,255,0.15);
            --accent: #f0883e;
            --accent-glow: rgba(240,136,62,0.2);
            --success: #3fb950;
            --danger: #f85149;
            --radius: 10px;
            --radius-lg: 16px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            background: rgba(13,17,23,0.85);
            backdrop-filter: blur(16px);
            padding: 0 24px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span { color: var(--text); }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .count-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            color: var(--primary);
        }

        .sync-badge {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid transparent;
            transition: all .3s;
        }
        .sync-badge.synced { background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.3); color: var(--success); }
        .sync-badge.syncing { background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.3); color: var(--primary); animation: pulse 1.2s infinite; }
        .sync-badge.error { background: rgba(248,81,73,0.1); border-color: rgba(248,81,73,0.3); color: var(--danger); }

        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.5 } }

        .btn-nav {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-sub);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .btn-nav:hover { border-color: var(--danger); color: var(--danger); background: rgba(248,81,73,0.07); }

        /* ── Layout ── */
        .main {
            display: flex;
            gap: 20px;
            padding: 20px 24px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .left { flex: 1; min-width: 0; }
        .right { width: 280px; flex-shrink: 0; }

        /* ── Source Tabs ── */
        .source-tabs {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all .2s;
            border-right: 1px solid var(--border);
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .tab-btn:last-child { border-right: none; }
        .tab-btn.active { background: var(--primary-glow); color: var(--primary); font-weight: 700; }
        .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

        /* ── Upload Zone ── */
        .upload-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all .25s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--primary);
            background: var(--primary-glow);
        }
        .upload-zone .upload-icon { font-size: 2.5rem; margin-bottom: 10px; line-height: 1; }
        .upload-zone h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
        .upload-zone p { font-size: 0.78rem; color: var(--text-sub); line-height: 1.6; }
        .upload-zone .format-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
        .format-tag {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-family: 'Space Mono', monospace;
            color: var(--text-sub);
        }

        /* ── Paste Zone ── */
        .paste-zone {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all .25s;
        }
        .paste-zone.paste-active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .paste-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .paste-header h3 { font-size: 0.9rem; font-weight: 700; }
        .paste-hint {
            font-size: 0.78rem;
            color: var(--text-sub);
            line-height: 1.6;
        }
        .paste-preview-strip {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            min-height: 0;
        }
        .paste-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--border);
            animation: popIn .25s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        /* ── URL Input ── */
        .url-zone {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
        }
        .url-zone h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .url-input-row { display: flex; gap: 8px; }
        .url-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 9px 14px;
            color: var(--text);
            font-size: 0.82rem;
            font-family: 'Space Mono', monospace;
            outline: none;
            transition: border-color .2s;
        }
        .url-input:focus { border-color: var(--primary); }
        .url-input::placeholder { color: var(--text-sub); }
        .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 9px 16px;
            font-size: 0.82rem;
            cursor: pointer;
            font-weight: 700;
            transition: opacity .2s;
            font-family: 'Noto Sans SC', sans-serif;
            white-space: nowrap;
        }
        .btn-add:hover { opacity: 0.85; }

        /* ── Gallery ── */
        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0 10px;
        }
        .gallery-header h3 { font-size: 0.85rem; color: var(--text-sub); font-weight: 500; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface2);
            position: relative;
            border: 2px solid var(--border);
            transition: border-color .2s, transform .2s;
            cursor: pointer;
        }
        .gallery-item:hover { border-color: var(--primary); transform: scale(1.03); }
        .gallery-item.selected { border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }

        .gallery-item img { width:100%; height:100%; object-fit:cover; display: block; }

        .gallery-item .item-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0;
            transition: opacity .2s;
        }
        .gallery-item:hover .item-overlay { opacity: 1; }

        .del-btn {
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.72rem;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .item-source {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.7);
            font-family: 'Space Mono', monospace;
            background: rgba(0,0,0,0.4);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* ── Right Panel ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
        }

        .preview-wrap {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 16px;
            position: relative;
        }
        .preview-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity .3s;
        }
        .preview-placeholder { color: var(--text-sub); font-size: 3rem; }

        .preview-name {
            font-size: 0.72rem;
            color: var(--text-sub);
            margin-bottom: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Space Mono', monospace;
        }

        .btn-random {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #e05c1a);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 1px;
            transition: opacity .2s, transform .1s;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 0 4px 20px rgba(240,136,62,0.3);
        }
        .btn-random:hover:not(:disabled) { opacity: 0.9; transform: scale(1.02); }
        .btn-random:active:not(:disabled) { transform: scale(0.98); }
        .btn-random:disabled { background: var(--surface2); color: var(--text-sub); cursor: not-allowed; box-shadow: none; }

        .stats {
            margin-top: 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .stat-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px;
            text-align: center;
        }
        .stat-val { font-size: 1.2rem; font-weight: 900; color: var(--primary); font-family: 'Space Mono', monospace; }
        .stat-lbl { font-size: 0.65rem; color: var(--text-sub); margin-top: 2px; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 70px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 0.82rem;
            z-index: 999;
            animation: slideIn .3s ease;
            pointer-events: none;
        }
        @keyframes slideIn {
            from { transform: translateX(30px); opacity:0; }
            to   { transform: translateX(0); opacity:1; }
        }

        /* ── Progress Bar ── */
        .progress-bar {
            height: 3px;
            background: var(--primary);
            width: 0%;
            transition: width .3s;
            border-radius: 2px;
            margin-bottom: 10px;
        }

        /* ── Responsive ── */
        @media(max-width:768px) {
            .main { flex-direction: column; }
            .right { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎲 <span>随机图片选</span></div>
        <div class="nav-right">
            <span class="count-badge" id="imageCount">0 张</span>
            <span class="sync-badge" id="syncStatus"></span>
            <button class="btn-nav" onclick="clearAll()">清空全部</button>
            <input type="file" id="fileInput" accept="image/*,video/*,.heic,.heif,.avif,.tiff,.tif,.bmp,.ico,.svg,.raw,.cr2,.nef,.arw,.dng,.orf,.pef,.rw2,.gif,.webp" multiple style="display:none;">
        </div>
    </nav>

    <div class="main">
        <div class="left">

            <!-- Source Tabs -->
            <div class="source-tabs">
                <button class="tab-btn active" onclick="switchTab('upload')" id="tab-upload">📁 本地上传</button>
                <button class="tab-btn" onclick="switchTab('paste')" id="tab-paste">📋 粘贴图片</button>
                <button class="tab-btn" onclick="switchTab('url')" id="tab-url">🔗 图片链接</button>
            </div>

            <!-- Upload Panel -->
            <div id="panel-upload">
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">📂</div>
                    <h3>点击选择 或 拖拽图片到此处</h3>
                    <p>支持批量上传，上传至 GitHub 云端永久保存</p>
                    <div class="format-tags">
                        <span class="format-tag">JPG</span><span class="format-tag">PNG</span><span class="format-tag">GIF</span>
                        <span class="format-tag">WEBP</span><span class="format-tag">SVG</span><span class="format-tag">BMP</span>
                        <span class="format-tag">HEIC</span><span class="format-tag">AVIF</span><span class="format-tag">TIFF</span>
                        <span class="format-tag">ICO</span><span class="format-tag">RAW</span><span class="format-tag">+更多</span>
                    </div>
                </div>
                <div class="progress-bar" id="uploadProgress"></div>
            </div>

            <!-- Paste Panel -->
            <div id="panel-paste" style="display:none;">
                <div class="paste-zone" id="pasteZone">
                    <div class="paste-header">
                        <span style="font-size:1.4rem;">📋</span>
                        <div>
                            <h3>粘贴图片 · 即传即用</h3>
                        </div>
                    </div>
                    <p class="paste-hint">
                        ① 截图后直接 <strong>Ctrl+V</strong>（Mac: Cmd+V）<br>
                        ② 从文件管理器复制图片后粘贴<br>
                        ③ 浏览器中右键图片 → 复制图片 → 粘贴<br>
                        ④ 支持粘贴图片 URL 文本（自动识别）
                    </p>
                    <div class="paste-preview-strip" id="pastePreviewStrip"></div>
                </div>
                <div class="progress-bar" id="pasteProgress"></div>
            </div>

            <!-- URL Panel -->
            <div id="panel-url" style="display:none;">
                <div class="url-zone">
                    <h3>🔗 通过链接添加图片</h3>
                    <div class="url-input-row">
                        <input class="url-input" id="urlInput" type="text" placeholder="https://example.com/image.jpg 或粘贴任意图片链接">
                        <button class="btn-add" onclick="addByUrl()">+ 添加</button>
                    </div>
                    <p style="font-size:0.73rem; color:var(--text-sub); margin-top:10px;">
                        输入图片直链即可加入图库，不上传至 GitHub，仅本次会话有效
                    </p>
                </div>
            </div>

            <!-- Gallery -->
            <div class="gallery-header">
                <h3 id="galleryLabel">图库</h3>
            </div>
            <div class="gallery" id="gallery"></div>
        </div>

        <div class="right">
            <div class="card">
                <div class="preview-wrap" id="previewWrap">
                    <span class="preview-placeholder">❓</span>
                </div>
                <div class="preview-name" id="previewName">尚未抽取</div>
                <button class="btn-random" id="randomBtn" disabled onclick="randomPick()">🎰 随机抽取</button>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-val" id="statTotal">0</div>
                        <div class="stat-lbl">图片总数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="statPicks">0</div>
                        <div class="stat-lbl">已抽次数</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ==================== 配置区 ====================
    const GITHUB_USER = 'locydx';
    const REPO_NAME   = 'image';
    const BRANCH      = 'main';
    const IMG_PATH    = 'images/';
    const TOKEN       = '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';

    const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${IMG_PATH}`;

    // ==================== 状态 ====================
    let images    = [];   // { id, name, url, sha, source }
    let pickCount = 0;
    let localIdCounter = 0;

    // ==================== Tab 切换 ====================
    function switchTab(name) {
        ['upload','paste','url'].forEach(t => {
            document.getElementById('panel-' + t).style.display = t === name ? 'block' : 'none';
            document.getElementById('tab-' + t).classList.toggle('active', t === name);
        });
    }

    // ==================== 图库渲染 ====================
    function renderGallery() {
        const g = document.getElementById('gallery');
        if (images.length === 0) {
            g.innerHTML = `<div style="grid-column:1/-1; color:var(--text-sub); font-size:0.82rem; padding:20px 0; text-align:center;">还没有图片，快去上传吧～</div>`;
        } else {
            g.innerHTML = images.map(img => `
                <div class="gallery-item" id="item-${img.id}" onclick="previewImg('${img.id}')">
                    <img src="${img.url}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22/>'">
                    <div class="item-overlay">
                        <span class="item-source">${img.source}</span>
                        <button class="del-btn" onclick="event.stopPropagation(); removeImage('${img.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('randomBtn').disabled = images.length === 0;
        document.getElementById('statTotal').textContent = images.length;
        document.getElementById('imageCount').textContent = images.length + ' 张';
        document.getElementById('galleryLabel').textContent = `图库（${images.length} 张）`;
    }

    function previewImg(id) {
        const img = images.find(i => i.id === id);
        if (!img) return;
        document.querySelectorAll('.gallery-item').forEach(el => el.classList.remove('selected'));
        document.getElementById('item-' + id)?.classList.add('selected');
        showPreview(img);
    }

    function showPreview(img) {
        document.getElementById('previewWrap').innerHTML = `<img src="${img.url}" alt="${img.name}">`;
        document.getElementById('previewName').textContent = img.name || img.url;
    }

    // ==================== 随机抽取 ====================
    function randomPick() {
        if (!images.length) return;
        pickCount++;
        document.getElementById('statPicks').textContent = pickCount;
        const img = images[Math.floor(Math.random() * images.length)];
        // 短暂闪烁动画
        const wrap = document.getElementById('previewWrap');
        wrap.style.opacity = '0.3';
        setTimeout(() => { wrap.style.opacity = '1'; showPreview(img); }, 200);
        // 高亮
        document.querySelectorAll('.gallery-item').forEach(el => el.classList.remove('selected'));
        document.getElementById('item-' + img.id)?.classList.add('selected');
        document.getElementById('item-' + img.id)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }

    // ==================== GitHub: 拉取图片 ====================
    async function fetchImages() {
        setSyncStatus('syncing', '⟳ 同步中');
        try {
            const res = await fetch(API_URL, { headers: { Authorization: `token ${TOKEN}` } });
            if (!res.ok) throw new Error('获取失败');
            const files = await res.json();
            const remoteImgs = files
                .filter(f => f.type === 'file' && f.name.match(/\.(png|jpg|jpeg|gif|webp|avif|bmp|ico|svg|tiff?|heic|heif)$/i))
                .map(f => ({ id: 'gh-' + f.sha.slice(0,8), name: f.name, url: f.download_url, sha: f.sha, source: 'GitHub' }));
            // 保留本地临时图片
            const locals = images.filter(i => i.source !== 'GitHub');
            images = [...remoteImgs, ...locals];
            renderGallery();
            setSyncStatus('synced', '☁️ 已同步');
        } catch(e) {
            setSyncStatus('error', '✕ 同步失败');
        }
    }

    // ==================== GitHub: 上传图片 ====================
    async function uploadToGitHub(file, progressId) {
        const ext = (file.name || 'image').split('.').pop().toLowerCase() || 'png';
        const fileName = Date.now() + '-' + Math.random().toString(36).slice(2,7) + '.' + ext;
        const path = IMG_PATH + fileName;

        // 读取 base64
        const base64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = e => res(e.target.result.split(',')[1]);
            r.onerror = rej;
            r.readAsDataURL(file);
        });

        setProgress(progressId, 60);

        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}`, {
            method: 'PUT',
            headers: {
                Authorization: `token ${TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: `上传 ${fileName}`, content: base64, branch: BRANCH })
        });

        setProgress(progressId, 100);
        setTimeout(() => setProgress(progressId, 0), 600);

        if (response.ok) {
            showToast('✓ 上传成功: ' + fileName, 'success');
            await fetchImages();
        } else {
            const err = await response.json();
            showToast('✕ 上传失败: ' + (err.message || '未知错误'), 'error');
        }
    }

    // ==================== 本地预览（不上传） ====================
    function addLocalImage(file) {
        const url = URL.createObjectURL(file);
        const id = 'local-' + (++localIdCounter);
        const name = file.name || ('粘贴图片-' + localIdCounter + '.' + (file.type.split('/')[1] || 'png'));
        images.push({ id, name, url, sha: null, source: '本地' });
        renderGallery();
        return id;
    }

    // ==================== 粘贴上传 ====================
    function handlePasteData(e) {
        const items = e.clipboardData?.items;
        if (!items) return;
        let handled = false;

        // 优先处理图片文件
        for (const item of items) {
            if (item.kind === 'file' && item.type.startsWith('image/')) {
                const blob = item.getAsFile();
                if (blob) {
                    // 同时本地预览 + 上传
                    addLocalImage(blob);
                    uploadToGitHub(blob, 'pasteProgress');
                    addPasteThumb(blob);
                    handled = true;
                }
            }
        }

        // 再处理文本（可能是图片 URL）
        if (!handled) {
            for (const item of items) {
                if (item.kind === 'string' && item.type === 'text/plain') {
                    item.getAsString(text => {
                        const urls = text.trim().split('\n').map(s => s.trim()).filter(s => isImageUrl(s));
                        urls.forEach(addImageByUrl);
                    });
                }
            }
        }
    }

    function addPasteThumb(blob) {
        const strip = document.getElementById('pastePreviewStrip');
        const img = document.createElement('img');
        img.className = 'paste-thumb';
        img.src = URL.createObjectURL(blob);
        strip.prepend(img);
        if (strip.children.length > 8) strip.lastChild.remove();
    }

    // ==================== URL 添加 ====================
    function isImageUrl(str) {
        try {
            const url = new URL(str);
            return url.protocol.startsWith('http');
        } catch { return false; }
    }

    function addByUrl() {
        const input = document.getElementById('urlInput');
        const val = input.value.trim();
        if (!val) return;
        const urls = val.split('\n').map(s => s.trim()).filter(Boolean);
        urls.forEach(addImageByUrl);
        input.value = '';
    }

    function addImageByUrl(url) {
        if (!isImageUrl(url)) { showToast('无效的图片链接', 'error'); return; }
        const existing = images.find(i => i.url === url);
        if (existing) { showToast('该图片已在图库中', 'error'); return; }
        const id = 'url-' + (++localIdCounter);
        const name = url.split('/').pop().split('?')[0] || 'url-image';
        images.push({ id, name, url, sha: null, source: 'URL' });
        renderGallery();
        showToast('✓ 已添加链接图片', 'success');
    }

    // ==================== 删除 ====================
    async function removeImage(id) {
        const img = images.find(i => i.id === id);
        if (!img) return;

        if (img.source === 'GitHub' && img.sha) {
            if (!confirm(`删除云端图片：${img.name}？`)) return;
            const path = IMG_PATH + img.name;
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}`, {
                method: 'DELETE',
                headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `删除 ${img.name}`, sha: img.sha, branch: BRANCH })
            });
            if (res.ok) {
                showToast('已删除云端图片', 'success');
                await fetchImages();
            } else {
                showToast('删除失败', 'error');
            }
        } else {
            // 本地/URL 直接移除
            images = images.filter(i => i.id !== id);
            renderGallery();
        }
    }

    async function clearAll() {
        if (!confirm('确定清空所有图片（含云端）？')) return;
        const ghImgs = images.filter(i => i.source === 'GitHub' && i.sha);
        for (const img of ghImgs) {
            const path = IMG_PATH + img.name;
            await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}`, {
                method: 'DELETE',
                headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `删除 ${img.name}`, sha: img.sha, branch: BRANCH })
            });
        }
        images = [];
        renderGallery();
        await fetchImages();
    }

    // ==================== UI 辅助 ====================
    function setSyncStatus(state, text) {
        const el = document.getElementById('syncStatus');
        el.className = 'sync-badge ' + state;
        el.textContent = text;
    }

    function setProgress(id, pct) {
        const el = document.getElementById(id);
        if (el) el.style.width = pct + '%';
    }

    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = type === 'error' ? '#f85149' : (type === 'success' ? '#3fb950' : '#58a6ff');
        toast.style.color = '#fff';
        toast.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // ==================== 事件绑定 ====================
    // 文件选择
    document.getElementById('fileInput').addEventListener('change', async e => {
        const files = Array.from(e.target.files);
        for (let i = 0; i < files.length; i++) {
            setProgress('uploadProgress', ((i+1)/files.length)*80);
            addLocalImage(files[i]);
            await uploadToGitHub(files[i], 'uploadProgress');
        }
        e.target.value = '';
    });

    // 拖拽
    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', async e => {
        e.preventDefault();
        uploadZone.classList.remove('drag-over');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.name.match(/\.(heic|heif|avif|tiff?|bmp|ico|svg|raw|cr2|nef|arw|dng|orf|pef|rw2)$/i));
        for (const file of files) {
            addLocalImage(file);
            await uploadToGitHub(file, 'uploadProgress');
        }
    });

    // 全局粘贴
    document.addEventListener('paste', e => {
        handlePasteData(e);
        // 粘贴时若在粘贴 tab 外，自动切换到粘贴 tab 并给反馈
        const pasteZone = document.getElementById('pasteZone');
        pasteZone.classList.add('paste-active');
        setTimeout(() => pasteZone.classList.remove('paste-active'), 800);
    });

    // URL 输入回车
    document.getElementById('urlInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addByUrl();
    });

    // ==================== 初始化 ====================
    fetchImages();
    </script>
</body>
</html>
